<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Ejemplo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Hospital Ejemplo</h1>
            <div class="live-ticket">
                Turno actual en ventanilla: <strong id="current-ticket">8</strong>
            </div>
        </div>
    </header>

    <main class="container">
        <h2>Nuestras Especialidades</h2>
        <p>Seleccione una especialidad para ver nuestros profesionales disponibles.</p>
        
        <div id="specialties-container" class="specialties-container">
            </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <h2 id="modal-doctor-name">Nombre del Doctor</h2>
            <p class="modal-subtitle">Reserva de turno presencial</p>

            <div class="form-group">
                <label for="appointment-date">Seleccione una fecha:</label>
                <input type="date" id="appointment-date">
            </div>

            <h3>Horarios</h3>
            <div id="time-slots" class="time-slots">
                </div>

            <div class="action-section">
                <button id="book-btn" class="btn-primary" disabled>Pedir Turno</button>
            </div>

            <div id="result-message" class="result-message hidden">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
